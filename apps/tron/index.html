<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Tron 3D Light Cycles</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Pixelify+Sans:wght@400..700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main id="app" aria-label="Tron 3D Light Cycles">
      <canvas id="gameCanvas" aria-label="3D Tron light cycle arena"></canvas>
      <div id="splitDivider" class="split-divider" aria-hidden="true"></div>
      <div id="viewportLabels" class="viewport-labels" aria-hidden="true">
        <span id="p1ViewportLabel" class="cyan-label">P1 RIDER POV</span>
        <span id="p2ViewportLabel" class="orange-label">P2 RIDER POV</span>
      </div>

      <div id="minimapPanel" class="minimap-panel" aria-label="Live overhead grid map">
        <canvas id="minimapCanvas" width="180" height="180"></canvas>
      </div>

      <div class="hud" aria-live="polite">
        <div class="score-panel cyan">
          <span>P1</span>
          <strong id="p1Score">0</strong>
        </div>
        <div class="status-panel">
          <span id="roundState">IDLE</span>
          <strong id="matchMode">GROUND GRID</strong>
        </div>
        <div class="score-panel orange">
          <span id="p2NameLabel">P2</span>
          <strong id="p2Score">0</strong>
        </div>
      </div>

      <section id="overlay" class="overlay" aria-live="assertive">
        <div id="panel" class="panel">
          <p class="eyebrow">LIGHT CYCLE PROGRAM</p>
          <h1><span>TRON</span> 3D</h1>
          <p class="lead">
            Press 1 for bot mode, 2 for multiplayer.
          </p>
          <p class="hint">After 1: press 3 for easy bot or 4 for hard bot</p>
        </div>
      </section>
    </main>

    <script type="module" src="game.js"></script>
  </body>
</html>
